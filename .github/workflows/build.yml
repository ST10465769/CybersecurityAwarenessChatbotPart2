name: Build CybersecurityChatbot Part 2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CybersecurityChatbot.csproj

      - name: Build project
        run: dotnet build CybersecurityChatbot.csproj --configuration Release --no-restore

      - name: Confirm build success
        run: echo "Build completed successfully!"
